<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Connect Daisy UI and Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Connect Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Connect Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <title>Job Tracker</title>
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-base-200"">
    <!-- Dashboard section -->
    <section class="w-8/12  mx-auto py-8" >
      <h1 class="font-bold text-center sm:text-left text-xl md:text-2xl text-neutral mb-5">
        Job Application Tracker
      </h1>
      <!-- header card container -->
      <div class="grid grid-cols-1 gap-5 md:grid-cols-3">
        <!-- header card -->
        <div class="card card-border bg-base-100 w-full">
          <div class="card-body">
            <p class="card-title text-sm text-neutral/50">Total</p>
            <h2 class="text-xl  font-bold md:text-2xl">8</h2>
            <div class="card-actions justify-end"></div>
          </div>
        </div>
        <!-- header card -->
        <div class="card card-border bg-base-100 w-full">
          <div class="card-body">
            <p class="card-title text-sm text-neutral/50">Interview</p>
            <h2 class="text-xl text-success  font-bold md:text-2xl">0</h2>
            <div class="card-actions justify-end"></div>
          </div>
        </div>
        <!-- header card -->
        <div class="card card-border bg-base-100 w-full">
          <div class="card-body">
            <p class="card-title  text-sm text-neutral/50">Rejected</p>
            <h2 class="text-xl  text-warning font-bold md:text-2xl">0</h2>
            <div class="card-actions justify-end"></div>
          </div>
        </div>
      </div>
       <div class="divider"></div>
    </section>
     
  </body>
</html>
